<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Jajod - Master System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #1a2a6c; --red: #b21f1f; --gold: #fdbb2d; --bg: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); padding-bottom: 100px; }
        header { background: var(--dark); color: white; padding: 25px; border-radius: 0 0 25px 25px; text-align: center; }
        .card { background: white; border-radius: 15px; padding: 15px; margin: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h4 { color: var(--dark); margin-bottom: 10px; border-bottom: 2px solid var(--gold); display: inline-block; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; }
        button { background: var(--red); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 5px; }
        .hidden { display: none !important; }
        
        /* PHOTO STYLING */
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); display: block; margin: 0 auto 10px; background: #eee; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .info-box { background: #f9f9f9; padding: 10px; border-radius: 10px; border-left: 3px solid var(--dark); }
        .label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: 700; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 12px 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #aaa; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h2 id="display-title">RPS JAJOD</h2>
    <p style="font-size: 11px; opacity: 0.8;">Admin Control & Photo System</p>
</header>

<div id="login-screen" style="padding: 20px;">
    <div class="card" style="margin-top: 30px;">
        <h3 style="text-align: center; margin-bottom:15px;">Secure Login</h3>
        <select id="role">
            <option value="Principal">Principal</option>
            <option value="Teacher">Teacher</option>
            <option value="Student">Student</option>
        </select>
        <input type="text" id="uid" placeholder="ID">
        <input type="password" id="ups" placeholder="Password">
        <button onclick="sys.login()">Sign In</button>
    </div>
</div>

<div id="app-screen" class="hidden">
    
    <div id="view-principal" class="hidden">
        <div class="card">
            <h4>Teacher Master Control</h4>
            <select id="p-t-list" onchange="sys.loadTeacherRights()"><option value="">Edit/Manage Teacher</option></select>
            <div id="t-edit-panel" class="hidden">
                <input type="text" id="et-name" placeholder="Name">
                <input type="text" id="et-classes" placeholder="Classes (1,2,3)">
                <select id="et-sub">
                    <option value="All">All Subjects</option>
                    <option value="Hindi">Hindi</option><option value="Math">Math</option>
                </select>
                <p class="label">Update Photo</p>
                <input type="file" id="et-pic" accept="image/*" onchange="sys.handlePic(event, 'et-preview')">
                <img id="et-preview" class="profile-img" src="">
                <button onclick="sys.updateTeacherRights()">Update Rights & Photo</button>
            </div>
        </div>
        <div class="card">
            <h4>Live School Logs</h4>
            <div id="principal-logs" style="font-size: 10px; max-height: 100px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="view-teacher" class="hidden">
        <div class="card">
            <img id="my-t-pic" class="profile-img" src="">
            <h3 id="t-welcome" style="text-align:center;"></h3>
        </div>
        <div class="card">
            <h4>Manage Student Records</h4>
            <select id="s-edit-list" onchange="sys.loadStudentForm()"><option value="">Select Student</option></select>
            <div id="s-edit-panel" class="hidden">
                <p class="label">Profile Photo</p>
                <input type="file" id="es-pic" accept="image/*" onchange="sys.handlePic(event, 'es-preview')">
                <img id="es-preview" class="profile-img" src="">
                <input type="text" id="es-f" placeholder="Father's Name">
                <input type="text" id="es-att" placeholder="Attendance %">
                <input type="text" id="es-fee" placeholder="Fees">
                <textarea id="es-hw" placeholder="Homework..."></textarea>
                <button onclick="sys.updateStudent()">Save Photo & Data</button>
            </div>
        </div>
    </div>

    <div id="view-student" class="hidden">
        <div class="card" style="text-align:center;">
            <img id="st-pic" class="profile-img" src="">
            <h2 id="st-name-disp"></h2>
            <p id="st-class-disp" class="label"></p>
        </div>
        <div class="card" style="background: #fff1f1;">
            <span class="label">Balance Fees</span>
            <h2 style="color:var(--red)">₹ <span id="st-fee-disp">0</span></h2>
        </div>
        <div class="card">
            <div class="info-grid">
                <div class="info-box"><span class="label">Father</span><b id="st-f-disp"></b></div>
                <div class="info-box"><span class="label">Attendance</span><b id="st-att-disp"></b></div>
            </div>
            <div style="margin-top:15px; padding:10px; background:#fff9db; border-radius:10px;">
                <span class="label">Homework</span>
                <p id="st-hw-disp" style="font-size:14px;"></p>
            </div>
        </div>
    </div>

</div>

<div id="nav" class="nav hidden">
    <div class="nav-item" onclick="location.reload()">🏠<br>Home</div>
    <div class="nav-item" onclick="location.reload()">🚪<br>Logout</div>
</div>

<script>
const sys = {
    db: {
        teachers: JSON.parse(localStorage.getItem('rps_final_t')) || [{id:'T1', name:'Demo Teacher', pass:'123', classes:'1,2,3', subject:'Math', pic:''}],
        students: JSON.parse(localStorage.getItem('rps_final_s')) || [],
        logs: JSON.parse(localStorage.getItem('rps_final_l')) || [],
        currentPic: ""
    },
    user: null,

    save: () => {
        localStorage.setItem('rps_final_t', JSON.stringify(sys.db.teachers));
        localStorage.setItem('rps_final_s', JSON.stringify(sys.db.students));
        localStorage.setItem('rps_final_l', JSON.stringify(sys.db.logs));
    },

    handlePic: (e, previewId) => {
        const reader = new FileReader();
        reader.onload = () => {
            sys.db.currentPic = reader.result;
            document.getElementById(previewId).src = reader.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    },

    login: () => {
        const r = document.getElementById('role').value;
        const id = document.getElementById('uid').value.trim();
        const ps = document.getElementById('ups').value.trim();

        if(r === "Principal" && id === "Azizkhan" && ps === "khanaziz") sys.user = {role:"Principal", name:"Principal"};
        else if(r === "Teacher") sys.user = sys.db.teachers.find(t => t.id === id && t.pass === ps);
        else if(r === "Student") sys.user = sys.db.students.find(s => s.id === id && s.pass === ps);

        if(sys.user) {
            sys.user.role = sys.user.role || r;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('nav').classList.remove('hidden');
            sys.render();
        } else alert("Invalid Login");
    },

    render: () => {
        const r = sys.user.role;
        ['view-principal', 'view-teacher', 'view-student'].forEach(v => document.getElementById(v).classList.add('hidden'));
        
        if(r === "Principal") {
            document.getElementById('view-principal').classList.remove('hidden');
            document.getElementById('p-t-list').innerHTML = '<option value="">Manage Teacher</option>' + sys.db.teachers.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            document.getElementById('principal-logs').innerHTML = sys.db.logs.map(l => `<div>${l}</div>`).join('');
        } else if(r === "Teacher") {
            document.getElementById('view-teacher').classList.remove('hidden');
            document.getElementById('my-t-pic').src = sys.user.pic || "";
            document.getElementById('t-welcome').innerText = sys.user.name;
            const allowed = sys.user.classes.split(',').map(x => x.trim());
            document.getElementById('s-edit-list').innerHTML = '<option value="">Select Student</option>' + 
                sys.db.students.filter(s => allowed.includes(s.class)).map(s => `<option value="${s.id}">${s.name} (Cl-${s.class})</option>`).join('');
        } else {
            document.getElementById('view-student').classList.remove('hidden');
            document.getElementById('st-pic').src = sys.user.pic || "";
            document.getElementById('st-name-disp').innerText = sys.user.name;
            document.getElementById('st-class-disp').innerText = `Class ${sys.user.class} | SR ${sys.user.sr}`;
            document.getElementById('st-fee-disp').innerText = sys.user.fee || "0";
            document.getElementById('st-f-disp').innerText = sys.user.f || "--";
            document.getElementById('st-att-disp').innerText = (sys.user.att || "0") + "%";
            document.getElementById('st-hw-disp').innerText = sys.user.hw || "None";
        }
    },

    loadTeacherRights: () => {
        const t = sys.db.teachers.find(x => x.id === document.getElementById('p-t-list').value);
        if(!t) return;
        document.getElementById('t-edit-panel').classList.remove('hidden');
        document.getElementById('et-name').value = t.name;
        document.getElementById('et-classes').value = t.classes;
        document.getElementById('et-sub').value = t.subject;
        document.getElementById('et-preview').src = t.pic || "";
        sys.db.currentPic = t.pic || "";
    },

    updateTeacherRights: () => {
        const t = sys.db.teachers.find(x => x.id === document.getElementById('p-t-list').value);
        t.name = document.getElementById('et-name').value;
        t.classes = document.getElementById('et-classes').value;
        t.subject = document.getElementById('et-sub').value;
        t.pic = sys.db.currentPic;
        sys.db.logs.unshift(`${new Date().toLocaleTimeString()}: Principal updated Rights for ${t.name}`);
        sys.save(); alert("Teacher Rights & Photo Updated!");
    },

    loadStudentForm: () => {
        const s = sys.db.students.find(x => x.id === document.getElementById('s-edit-list').value);
        if(!s) return;
        document.getElementById('s-edit-panel').classList.remove('hidden');
        document.getElementById('es-f').value = s.f;
        document.getElementById('es-att').value = s.att;
        document.getElementById('es-fee').value = s.fee;
        document.getElementById('es-hw').value = s.hw;
        document.getElementById('es-preview').src = s.pic || "";
        sys.db.currentPic = s.pic || "";
    },

    updateStudent: () => {
        const s = sys.db.students.find(x => x.id === document.getElementById('s-edit-list').value);
        s.f = document.getElementById('es-f').value;
        s.att = document.getElementById('es-att').value;
        s.fee = document.getElementById('es-fee').value;
        s.hw = `[${sys.user.subject}] ` + document.getElementById('es-hw').value;
        s.pic = sys.db.currentPic;
        sys.save(); alert("Student Photo & Data Saved!");
    }
};
</script>
</body>
</html>
