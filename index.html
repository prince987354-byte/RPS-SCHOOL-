<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School App Pro</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg,#141e30,#243b55);
  color:white;
}

/* Glass */
.glass {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  padding:15px;
  margin:10px;
}

/* Layout */
.container {padding:15px;}
input,button,select {
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}

button {background:#00c6ff;color:white;}

.hidden {display:none;}

.card {
  animation:fade 0.5s ease;
}
@keyframes fade {
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1;}
}

#toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00c6ff;
  padding:12px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login">
  <div class="glass">
    <h2>Login</h2>
    <select id="role">
      <option>Principal</option>
      <option>Teacher</option>
      <option>Student</option>
    </select>
    <input id="id" placeholder="ID">
    <input id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <h2 id="title"></h2>

  <!-- NAV -->
  <div class="glass">
    <button onclick="show('students')">Students</button>
    <button onclick="show('attendance')">Attendance</button>
    <button onclick="show('homework')">Homework</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- STUDENTS -->
  <div id="students" class="glass hidden">
    <h3>Add Student</h3>
    <input id="sname" placeholder="Name">
    <input id="sid" placeholder="Student ID">
    <input id="spass" placeholder="Password">
    <input type="file" id="sphoto">
    <button onclick="addStudent()">Add</button>

    <div id="studentList"></div>
  </div>

  <!-- ATTENDANCE -->
  <div id="attendance" class="glass hidden">
    <h3>Mark Attendance</h3>
    <div id="attendanceList"></div>
    <button onclick="saveAttendance()">Save</button>
  </div>

  <!-- HOMEWORK -->
  <div id="homework" class="glass hidden">
    <h3>Add Homework</h3>
    <input id="htitle" placeholder="Title">
    <input id="hdesc" placeholder="Description">
    <button onclick="addHomework()">Add</button>

    <div id="homeworkList"></div>
  </div>

</div>

</div>

<div id="toast"></div>

<script>

/* ===== DATA ===== */
let students = JSON.parse(localStorage.getItem("students")) || [];
let homework = JSON.parse(localStorage.getItem("homework")) || [];
let attendance = [];

const PRINCIPAL = {id:"Azizkhan", pass:"khanaziz"};
let teachers = JSON.parse(localStorage.getItem("teachers")) || [];

let currentUser = null;

/* ===== TOAST ===== */
function toast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

/* ===== LOGIN ===== */
function login(){
  let role = document.getElementById("role").value;
  let id = document.getElementById("id").value;
  let pass = document.getElementById("pass").value;

  if(role==="Principal" && id===PRINCIPAL.id && pass===PRINCIPAL.pass){
    start("Principal");
  }
  else if(role==="Teacher"){
    let t = teachers.find(x=>x.id===id && x.pass===pass);
    if(t) start("Teacher");
    else toast("Wrong Teacher Login");
  }
  else if(role==="Student"){
    let s = students.find(x=>x.id===id && x.pass===pass);
    if(s){
      currentUser = s;
      start("Student");
    } else toast("Wrong Student Login");
  }
}

/* ===== START ===== */
function start(role){
  document.getElementById("login").style.display="none";
  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("title").innerText = role+" Dashboard";
  show('students');
  loadStudents();
  loadHomework();
}

/* ===== NAV ===== */
function show(tab){
  document.querySelectorAll("#dashboard > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(tab).classList.remove("hidden");

  if(tab==="attendance") loadAttendance();
}

/* ===== STUDENT ===== */
function addStudent(){
  let name = sname.value;
  let id = sid.value;
  let pass = spass.value;
  let file = sphoto.files[0];

  let reader = new FileReader();
  reader.onload = function(){
    students.push({name,id,pass,photo:reader.result});
    localStorage.setItem("students",JSON.stringify(students));
    loadStudents();
    toast("Student Added");
  };
  if(file) reader.readAsDataURL(file);
}

function loadStudents(){
  let list = document.getElementById("studentList");
  list.innerHTML="";
  students.forEach(s=>{
    list.innerHTML+=`
      <div class="glass card">
        <img src="${s.photo}" width="50">
        ${s.name} (${s.id})
      </div>
    `;
  });
}

/* ===== ATTENDANCE ===== */
function loadAttendance(){
  let div = document.getElementById("attendanceList");
  div.innerHTML="";
  students.forEach(s=>{
    div.innerHTML+=`
      <div>
        ${s.name}
        <select id="att_${s.id}">
          <option>Present</option>
          <option>Absent</option>
        </select>
      </div>
    `;
  });
}

function saveAttendance(){
  let today = new Date().toLocaleDateString();
  let record = {date:today,data:{}};

  students.forEach(s=>{
    record.data[s.id] = document.getElementById("att_"+s.id).value;
  });

  attendance.push(record);
  toast("Attendance Saved");
}

/* ===== HOMEWORK ===== */
function addHomework(){
  let title = htitle.value;
  let desc = hdesc.value;

  homework.push({title,desc});
  localStorage.setItem("homework",JSON.stringify(homework));
  loadHomework();
}

function loadHomework(){
  let list = document.getElementById("homeworkList");
  list.innerHTML="";
  homework.forEach(h=>{
    list.innerHTML+=`
      <div class="glass card">
        <b>${h.title}</b><br>
        ${h.desc}
      </div>
    `;
  });
}

/* ===== LOGOUT ===== */
function logout(){
  location.reload();
}

</script>

</body>
</html>
