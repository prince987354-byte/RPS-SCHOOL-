<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPS Master Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; /* Indigo */
            --secondary: #4f46e5;
            --accent: #f43f5e; /* Rose */
            --bg: #0f172a; /* Slate 900 */
            --card: rgba(255, 255, 255, 0.05);
            --text-p: #f8fafc;
            --text-s: #94a3b8;
            --glass: blur(12px) saturate(180%);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text-p); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden;
        }

        /* Phone Frame Simulation */
        .app-shell {
            width: 100%;
            max-width: 414px;
            height: 100%;
            background: #000;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Smooth View Transitions */
        .view {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding-bottom: 90px;
            overflow-y: auto;
            background: var(--bg);
            z-index: 10;
        }

        .view.hidden { transform: translateY(30px); opacity: 0; pointer-events: none; z-index: 5; }
        .view.active { transform: translateY(0); opacity: 1; z-index: 20; }

        /* Modern Typography & UI */
        .glass-header {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            padding: 50px 25px 30px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            position: relative;
        }

        .profile-float {
            background: rgba(255,255,255,0.1);
            backdrop-filter: var(--glass);
            margin: -25px 20px 20px;
            padding: 15px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideIn 0.6s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar { width: 60px; height: 60px; border-radius: 20px; object-fit: cover; border: 2px solid #fff; }

        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
        .grid-card {
            background: var(--card);
            padding: 20px 10px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: 0.3s;
        }
        .grid-card:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
        .grid-card i { font-size: 26px; margin-bottom: 10px; display: block; filter: drop-shadow(0 0 8px var(--primary)); }
        .grid-card span { font-size: 11px; font-weight: 600; color: var(--text-s); }

        /* Input Styles */
        input, select, textarea {
            width: 100%; padding: 16px; margin: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; color: #fff; outline: none;
        }

        .btn {
            background: var(--primary);
            color: white; border: none; padding: 18px;
            border-radius: 18px; font-weight: 800; cursor: pointer;
            width: 100%; transition: 0.3s; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        .btn:active { transform: scale(0.96); }

        /* Navigation Bar */
        .nav-bar {
            position: absolute; bottom: 0;
            width: 100%; height: 85px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: var(--glass);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .nav-btn { color: var(--text-s); font-size: 10px; font-weight: bold; text-align: center; cursor: pointer; flex: 1; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn i { font-size: 24px; display: block; margin-bottom: 4px; }
        .nav-center { background: var(--primary); color: white !important; width: 55px; height: 55px; border-radius: 50%; transform: translateY(-25px); display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.5); border: 4px solid var(--bg); }

        /* Data Tables */
        table { width: 100%; border-spacing: 0 10px; }
        tr { background: var(--card); border-radius: 15px; }
        td, th { padding: 15px; text-align: left; }
        td:first-child { border-radius: 15px 0 0 15px; }
        td:last-child { border-radius: 0 15px 15px 0; }
        .pill { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body>

<div class="app-shell">

    <div id="v-login" class="view active" style="display:flex; flex-direction:column; justify-content:center; padding:40px;">
        <div style="text-align: center; margin-bottom: 50px;">
            <div style="background:var(--primary); width:80px; height:80px; border-radius:24px; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:40px; box-shadow:0 0 30px rgba(99,102,241,0.5);">R</div>
            <h1 style="margin-top:20px; font-size:32px;">RPS PORTAL</h1>
            <p style="color:var(--text-s)">Welcome back, Scholar</p>
        </div>
        <input type="text" id="l-id" placeholder="ID Number">
        <input type="password" id="l-ps" placeholder="Password">
        <button class="btn" onclick="sys.login()" style="margin-top:20px;">AUTHENTICATE</button>
    </div>

    <div id="v-admin" class="view hidden">
        <div class="glass-header"><h2>Admin Center</h2></div>
        <div style="padding:20px;">
            <div class="grid-card" style="margin-bottom:20px;">
                <h3 style="margin:0">Create Student</h3>
                <input type="text" id="a-id" placeholder="Mobile / ID">
                <input type="text" id="a-nm" placeholder="Full Name">
                <input type="password" id="a-pass" placeholder="Password">
                <input type="file" id="a-pic" accept="image/*">
                <button class="btn" onclick="sys.reg()">Save Record</button>
            </div>
            <div class="grid-card" style="margin-bottom:20px; background:rgba(99,102,241,0.1)">
                <h3 style="margin:0">Marks & Attendance</h3>
                <select id="a-sel"></select>
                <div style="display:flex; gap:10px; margin:10px 0;">
                    <button class="btn" style="background:#10b981" onclick="sys.mark('Present')">Present</button>
                    <button class="btn" style="background:#f43f5e" onclick="sys.mark('Absent')">Absent</button>
                </div>
                <input type="text" id="a-sub" placeholder="Subject">
                <div style="display:flex; gap:10px;">
                    <input type="number" id="a-t" placeholder="Total">
                    <input type="number" id="a-o" placeholder="Obtained">
                </div>
                <button class="btn" onclick="sys.saveRes()">Publish Result</button>
            </div>
            <button class="btn" style="background:#334155" onclick="location.reload()">Logout Admin</button>
        </div>
    </div>

    <div id="v-home" class="view hidden">
        <div class="glass-header">
            <h2 style="margin:0;">Dashboard</h2>
            <div id="live-clock" style="font-size:12px; opacity:0.6;"></div>
        </div>
        <div class="profile-float">
            <img id="s-img" src="" class="avatar">
            <div>
                <h3 id="s-name" style="margin:0">Loading...</h3>
                <span id="s-id-txt" style="color:var(--primary); font-size:12px; font-weight:800;">ID: 000</span>
            </div>
        </div>

        <div class="grid">
            <div class="grid-card" onclick="sys.go('view', 'att')"><i>📅</i><span>Attendance</span></div>
            <div class="grid-card" onclick="sys.go('view', 'res')"><i>🏆</i><span>Results</span></div>
            <div class="grid-card" onclick="sys.go('view', 'hw')"><i>📚</i><span>Homework</span></div>
            <div class="grid-card" onclick="sys.go('view', 'fee')"><i>💳</i><span>Fees</span></div>
            <div class="grid-card" onclick="sys.go('view', 'syl')"><i>📑</i><span>Syllabus</span></div>
            <div class="grid-card" onclick="sys.go('view', 'prof')"><i>👤</i><span>Profile</span></div>
        </div>

        <div style="padding:0 20px;">
            <div class="grid-card" style="text-align:left; background:linear-gradient(to right, #4f46e5, #818cf8); border:none;">
                <h4 style="margin:0; color:#fff;">📢 Board Notice</h4>
                <p id="news-txt" style="font-size:12px; margin-top:8px; opacity:0.9;">System is active.</p>
            </div>
        </div>
    </div>

    <div id="v-data" class="view hidden">
        <div class="glass-header"><h2 id="v-title">Info</h2></div>
        <div id="v-content" style="padding:20px;"></div>
        <div style="padding:0 20px;"><button class="btn" onclick="sys.go('home')">Return Home</button></div>
    </div>

    <div id="navbar" class="nav-bar" style="display:none;">
        <div class="nav-btn active" onclick="sys.go('home')"><i>🏠</i>Home</div>
        <div class="nav-btn" onclick="sys.go('view', 'prof')"><i>👤</i>Profile</div>
        <div class="nav-btn nav-center" onclick="sys.go('home')">🔳</div>
        <div class="nav-btn"><i>🔔</i>Alerts</div>
        <div class="nav-btn"><i>🛠️</i>Tools</div>
    </div>

</div>

<script>
const sys = {
    db: JSON.parse(localStorage.getItem('rps_pro_v10')) || [],
    news: localStorage.getItem('rps_news') || "Welcome to RPS Jajod Portal.",
    user: null,

    login() {
        const id = document.getElementById('l-id').value, ps = document.getElementById('l-ps').value;
        if(id === "9999" && ps === "RPS@123") return this.go('admin');
        const u = this.db.find(x => x.id === id && x.ps === ps);
        if(u) { this.user = u; this.loadUser(); this.go('home'); } else alert("Access Denied");
    },

    reg() {
        const id = document.getElementById('a-id').value, nm = document.getElementById('a-nm').value, ps = document.getElementById('a-pass').value, f = document.getElementById('a-pic').files[0];
        const save = (img) => {
            this.db.push({ id, nm, ps, img:img||'', att:[], res:[] });
            this.sync(); this.refreshAdm(); alert("Student Saved");
        };
        if(f) { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => save(r.result); } else save();
    },

    mark(st) {
        const id = document.getElementById('a-sel').value, idx = this.db.findIndex(x => x.id === id);
        this.db[idx].att.unshift({ d: new Date().toLocaleDateString(), st });
        this.sync(); alert("Attendance Logged");
    },

    saveRes() {
        const id = document.getElementById('a-sel').value, sub = document.getElementById('a-sub').value, t = document.getElementById('a-t').value, o = document.getElementById('a-o').value;
        const idx = this.db.findIndex(x => x.id === id);
        this.db[idx].res.push({ sub, t, o });
        this.sync(); alert("Result Posted");
    },

    loadUser() {
        document.getElementById('s-name').innerText = this.user.nm;
        document.getElementById('s-id-txt').innerText = "STUDENT ID: " + this.user.id;
        document.getElementById('s-img').src = this.user.img || "https://ui-avatars.com/api/?name="+this.user.nm+"&background=6366f1&color=fff";
        document.getElementById('news-txt').innerText = this.news;
    },

    go(pg, type) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('navbar').style.display = (pg === 'login' || pg === 'admin') ? 'none' : 'flex';
        
        if(pg === 'home') document.getElementById('v-home').classList.add('active');
        if(pg === 'admin') { document.getElementById('v-admin').classList.add('active'); this.refreshAdm(); }
        if(pg === 'view') {
            document.getElementById('v-data').classList.add('active');
            this.render(type);
        }
    },

    render(type) {
        const box = document.getElementById('v-content');
        const tit = document.getElementById('v-title');
        box.innerHTML = "";
        if(type === 'att') {
            tit.innerText = "Attendance Log";
            box.innerHTML = `<table>` + this.user.att.map(a => `<tr><td>${a.d}</td><td style="text-align:right"><span class="pill" style="background:${a.st=='Present'?'#10b981':'#f43f5e'}">${a.st}</span></td></tr>`).join('') + `</table>`;
        } else if(type === 'res') {
            tit.innerText = "Academic Results";
            box.innerHTML = `<table>` + this.user.res.map(r => `<tr><td><b>${r.sub}</b></td><td>${r.o}/${r.t}</td><td style="color:var(--primary); font-weight:800">${(r.o/r.t*100).toFixed(1)}%</td></tr>`).join('') + `</table>`;
        } else if(type === 'prof') {
            tit.innerText = "Student Profile";
            box.innerHTML = `<div class="grid-card"><img src="${this.user.img || ''}" class="avatar" style="width:100px;height:100px;margin-bottom:15px;"><br><h2>${this.user.nm}</h2><p>Roll No: ${this.user.id}</p><p>Status: Active Scholar</p></div>`;
        } else {
            tit.innerText = "Information";
            box.innerHTML = `<div class="grid-card">No data available for this section yet.</div>`;
        }
    },

    sync() { localStorage.setItem('rps_pro_v10', JSON.stringify(this.db)); },
    refreshAdm() { document.getElementById('a-sel').innerHTML = this.db.map(s => `<option value="${s.id}">${s.nm}</option>`).join(''); }
};

setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleString(); }, 1000);
</script>
</body>
</html>
