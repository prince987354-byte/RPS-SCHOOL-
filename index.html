<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Jajod - Final Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #b21f1f; --dark: #1a2a6c; --bg: #f4f4f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #333; padding-bottom: 80px; }
        header { background: linear-gradient(to right, var(--main), var(--dark)); color: white; padding: 20px; text-align: center; }
        .glass { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 15px; border-top: 5px solid var(--main); }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; outline: none; }
        button { background: var(--main); color: white; border: none; font-weight: 700; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .hidden { display: none !important; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: white; display: flex; align-items: center; border-top: 1px solid #ddd; }
        .nav-item { flex: 1; text-align: center; font-size: 12px; color: #666; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
    </style>
</head>
<body>

<header>
    <h2 style="font-size: 18px;">RAJASTHAN PUBLIC SCHOOL</h2>
    <p style="font-size: 12px;">JAJOD, SIKAR</p>
</header>

<div id="login-view">
    <div class="glass" style="max-width: 400px; margin: 40px auto;">
        <h3 style="text-align: center; margin-bottom: 15px;">Campus Login</h3>
        <select id="role">
            <option value="Principal">Principal</option>
            <option value="Teacher">Teacher</option>
            <option value="Student">Student</option>
        </select>
        <input type="text" id="uid" placeholder="User ID">
        <input type="password" id="ups" placeholder="Password">
        <button onclick="auth()">Sign In</button>
        <hr style="margin: 15px 0; opacity: 0.3;">
        <button style="background: #666; font-size: 11px;" onclick="resetAll()">Reset System (Clear All Data)</button>
    </div>
</div>

<div id="app" class="hidden">
    <div id="view-principal" class="hidden">
        <div class="glass">
            <h4>Add New Teacher</h4>
            <input type="text" id="nt-name" placeholder="Teacher Name">
            <input type="text" id="nt-id" placeholder="Create Teacher ID (e.g. T1)">
            <input type="text" id="nt-pass" placeholder="Create Password">
            <button onclick="addTeacher()">Save Teacher</button>
        </div>
        <div class="glass">
            <h4>Registered Teachers</h4>
            <div id="t-list-table"></div>
        </div>
    </div>

    <div id="view-teacher" class="hidden">
        <div class="glass">
            <h4>Add New Student</h4>
            <input type="text" id="ns-name" placeholder="Student Name">
            <input type="text" id="ns-id" placeholder="Student ID (e.g. S1)">
            <input type="text" id="ns-pass" placeholder="Password">
            <button onclick="addStudent()">Add Student</button>
        </div>
        <div class="glass">
            <h4>Homework & Fees</h4>
            <select id="s-select" onchange="loadStudent()"><option value="">Select Student</option></select>
            <div id="s-edit" class="hidden">
                <input type="text" id="s-fee" placeholder="Fee Status">
                <textarea id="s-hw" placeholder="Homework..."></textarea>
                <button onclick="updateStudent()">Update Student</button>
            </div>
        </div>
    </div>

    <div id="view-student" class="hidden">
        <div class="glass" style="background: var(--dark); color: white;">
            <h2 id="st-name"></h2>
            <p id="st-id"></p>
        </div>
        <div class="glass">
            <h4 style="color: var(--main);">📚 Homework</h4>
            <p id="st-hw" style="margin-top: 10px;"></p>
        </div>
        <div class="glass">
            <h4>💰 Fee Status</h4>
            <p id="st-fee"></p>
        </div>
    </div>
</div>

<div id="nav" class="nav hidden">
    <div class="nav-item" onclick="location.reload()">🏠 Home</div>
    <div class="nav-item" onclick="location.reload()">🚪 Logout</div>
</div>

<script>
    // System Data
    let db = {
        teachers: JSON.parse(localStorage.getItem('rps_t')) || [],
        students: JSON.parse(localStorage.getItem('rps_s')) || []
    };

    let user = null;

    function auth() {
        const role = document.getElementById('role').value;
        const id = document.getElementById('uid').value.trim().toLowerCase();
        const pass = document.getElementById('ups').value.trim();

        // 1. Principal Login
        if (role === "Principal" && id === "azizkhan" && pass === "khanaziz") {
            user = { role: "Principal", name: "Aziz Khan" };
        } 
        // 2. Teacher Login
        else if (role === "Teacher") {
            user = db.teachers.find(t => t.id.toLowerCase() === id && t.pass === pass);
        }
        // 3. Student Login
        else if (role === "Student") {
            user = db.students.find(s => s.id.toLowerCase() === id && s.pass === pass);
        }

        if (user) {
            user.role = user.role || role;
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('nav').classList.remove('hidden');
            loadScreen();
        } else {
            alert("❌ ID or Password Wrong!\nTip: Check if you selected the correct Role.");
        }
    }

    function loadScreen() {
        document.getElementById('view-principal').classList.add('hidden');
        document.getElementById('view-teacher').classList.add('hidden');
        document.getElementById('view-student').classList.add('hidden');

        if (user.role === "Principal") {
            document.getElementById('view-principal').classList.remove('hidden');
            renderTeachers();
        } else if (user.role === "Teacher") {
            document.getElementById('view-teacher').classList.remove('hidden');
            syncStudents();
        } else {
            document.getElementById('view-student').classList.remove('hidden');
            document.getElementById('st-name').innerText = user.name;
            document.getElementById('st-id').innerText = "ID: " + user.id;
            document.getElementById('st-hw').innerText = user.hw || "No homework today.";
            document.getElementById('st-fee').innerText = user.fee || "₹ 0 Pending";
        }
    }

    // PRINCIPAL FUNCTIONS
    function addTeacher() {
        const name = document.getElementById('nt-name').value;
        const id = document.getElementById('nt-id').value;
        const pass = document.getElementById('nt-pass').value;
        if(!name || !id || !pass) return alert("Please fill all fields");

        db.teachers.push({ name, id, pass });
        save();
        renderTeachers();
        alert("Success! Teacher can now login with ID: " + id);
    }

    function renderTeachers() {
        let html = `<table><tr><th>Name</th><th>ID</th><th>Pass</th></tr>`;
        db.teachers.forEach(t => {
            html += `<tr><td>${t.name}</td><td><b>${t.id}</b></td><td>${t.pass}</td></tr>`;
        });
        html += `</table>`;
        document.getElementById('t-list-table').innerHTML = html;
    }

    // TEACHER FUNCTIONS
    function addStudent() {
        const name = document.getElementById('ns-name').value;
        const id = document.getElementById('ns-id').value;
        const pass = document.getElementById('ns-pass').value;
        if(!name || !id || !pass) return alert("Please fill all fields");

        db.students.push({ name, id, pass, hw: "", fee: "" });
        save();
        syncStudents();
        alert("Student added!");
    }

    function syncStudents() {
        const sel = document.getElementById('s-select');
        sel.innerHTML = '<option value="">Select Student</option>' + 
            db.students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    }

    function loadStudent() {
        const id = document.getElementById('s-select').value;
        const s = db.students.find(x => x.id === id);
        if(!s) return;
        document.getElementById('s-edit').classList.remove('hidden');
        document.getElementById('s-fee').value = s.fee;
        document.getElementById('s-hw').value = s.hw;
    }

    function updateStudent() {
        const id = document.getElementById('s-select').value;
        const s = db.students.find(x => x.id === id);
        s.fee = document.getElementById('s-fee').value;
        s.hw = document.getElementById('s-hw').value;
        save();
        alert("Data Updated for Student!");
    }

    // HELPERS
    function save() {
        localStorage.setItem('rps_t', JSON.stringify(db.teachers));
        localStorage.setItem('rps_s', JSON.stringify(db.students));
    }

    function resetAll() {
        if(confirm("Are you sure? This will delete ALL teachers and students data!")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
