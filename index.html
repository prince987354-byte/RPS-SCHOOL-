<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Portal - Pro</title>
    <style>
        :root { 
            --primary: #4361ee; --secondary: #3f37c9; --success: #4cc9f0; 
            --danger: #f72585; --dark: #0f172a; --glass: rgba(255, 255, 255, 0.9);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: #e2e8f0; color: var(--dark); overflow: hidden; }

        /* Container & Animations */
        .app-shell { width: 100%; max-width: 450px; height: 100vh; background: #fff; margin: 0 auto; position: relative; overflow-y: auto; overflow-x: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.2); }
        .page { position: absolute; width: 100%; height: 100%; top: 0; left: 0; background: white; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding-bottom: 80px; overflow-y: auto; }
        .page.hidden { transform: translateX(100%); }
        .page.active { transform: translateX(0); }

        /* Header UI */
        .header { background: var(--dark); color: white; padding: 40px 20px; border-radius: 0 0 30px 30px; position: sticky; top: 0; z-index: 10; transition: 0.3s; }
        .profile-card { background: white; margin: -30px 20px 20px; padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }

        /* Interactive Elements */
        .card { background: #f8fafc; margin: 15px; padding: 20px; border-radius: 15px; border: 1px solid #eef2ff; transition: 0.3s; }
        .card:active { transform: scale(0.98); }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 12px; transition: 0.3s; font-size: 15px; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(67, 97, 238, 0.2); }
        
        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover { background: var(--secondary); }
        .btn:active { transform: translateY(2px); }

        /* Grid */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 15px; }
        .menu-btn { background: #fff; padding: 20px 5px; border-radius: 18px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; cursor: pointer; }
        .menu-btn span { display: block; font-size: 11px; font-weight: bold; margin-top: 8px; color: #64748b; }

        /* Navigation Bar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: var(--glass); backdrop-filter: blur(10px); display: flex; height: 75px; border-top: 1px solid #f1f5f9; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; cursor: pointer; font-size: 11px; font-weight: bold; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; margin-bottom: 3px; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 15px 10px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-shell">
    
    <div id="pg-login" class="page active" style="display: flex; flex-direction: column; justify-content: center; padding: 40px;">
        <div style="text-align: center; margin-bottom: 40px;">
            <div style="font-size: 50px;">🏫</div>
            <h1 style="margin: 10px 0; letter-spacing: -1px;">RPS PORTAL</h1>
            <p style="color: #64748b;">Sign in to continue</p>
        </div>
        <input type="text" id="uid" placeholder="ID Number">
        <input type="password" id="ups" placeholder="Password">
        <button class="btn" onclick="app.login()" style="margin-top: 20px;">LOGIN</button>
    </div>

    <div id="pg-home" class="page hidden">
        <div class="header">
            <h2 style="margin:0;">Dashboard</h2>
            <div id="clock" style="font-size: 12px; opacity: 0.7;"></div>
        </div>
        <div class="profile-card">
            <img src="" id="stu-img" class="avatar">
            <div>
                <h3 id="stu-name" style="margin:0;">User</h3>
                <span id="stu-id-tag" style="font-size: 12px; color: var(--primary); font-weight: 800;"></span>
            </div>
        </div>
        
        <div class="menu-grid">
            <div class="menu-btn" onclick="app.view('att')">🗓️<span>Attendance</span></div>
            <div class="menu-btn" onclick="app.view('res')">📊<span>Results</span></div>
            <div class="menu-btn" onclick="app.view('prof')">👤<span>Profile</span></div>
        </div>

        <div class="card" style="background: var(--primary); color: white;">
            <h4 style="margin:0;">📢 News Update</h4>
            <p id="news-box" style="font-size: 13px; margin: 10px 0 0;">Welcome to RPS Jajod Portal!</p>
        </div>
    </div>

    <div id="pg-admin" class="page hidden">
        <div class="header" style="background: #1e293b;">
            <h2>ADMIN</h2>
            <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:8px;">Exit</button>
        </div>
        
        <div style="padding: 10px;">
            <div class="card">
                <h4>1. Register Student</h4>
                <input type="text" id="a-id" placeholder="Mobile">
                <input type="text" id="a-nm" placeholder="Name">
                <input type="password" id="a-ps" placeholder="Password">
                <button class="btn" onclick="app.saveStu()">Register</button>
            </div>
            
            <div class="card">
                <h4>2. News & Data</h4>
                <select id="a-sel"></select>
                <textarea id="a-news" placeholder="Enter News or Data" style="width:100%; height:80px; border:1px solid #ddd; border-radius:10px; padding:10px;"></textarea>
                <button class="btn" style="margin-top:10px;" onclick="app.pushNews()">Update Portal</button>
            </div>

            <div class="card">
                <h4>3. Result Management</h4>
                <input type="text" id="a-sub" placeholder="Subject">
                <div style="display:flex; gap:10px;"><input type="number" id="a-t" placeholder="Total"><input type="number" id="a-o" placeholder="Obtained"></div>
                <button class="btn" style="background:var(--dark)" onclick="app.saveResult()">Add Marks</button>
            </div>
        </div>
    </div>

    <div id="pg-viewer" class="page hidden">
        <div class="header">
            <h2 id="view-title">Details</h2>
            <button class="btn" style="width:auto; padding:5px 15px;" onclick="app.showPage('pg-home')">Back</button>
        </div>
        <div id="view-content" style="padding: 20px;"></div>
    </div>

    <div id="nav-bar" class="bottom-nav hidden">
        <div class="nav-item active" onclick="app.showPage('pg-home')"><i>🏠</i>Home</div>
        <div class="nav-item" onclick="app.view('prof')"><i>👤</i>Profile</div>
        <div class="nav-item" onclick="app.showPage('pg-home')"><div style="background:var(--primary); color:white; padding:15px; border-radius:50%; margin-top:-40px;">➕</div></div>
        <div class="nav-item" onclick="app.showPage('pg-home')"><i>🔔</i>Alerts</div>
        <div class="nav-item" onclick="alert('RPS News Feed is Live')"><i>🏢</i>News</div>
    </div>

</div>

<script>
const app = {
    db: JSON.parse(localStorage.getItem('rps_pro_db')) || [],
    user: null,
    news: localStorage.getItem('rps_pro_news') || "No new alerts from RPS Jajod.",

    login() {
        const id = document.getElementById('uid').value, ps = document.getElementById('ups').value;
        if(id === "9999" && ps === "RPS@123") return this.showPage('pg-admin', true);
        const u = this.db.find(x => x.id === id && x.ps === ps);
        if(u) { this.user = u; this.loadUser(); this.showPage('pg-home'); } else alert("Wrong credentials!");
    },

    saveStu() {
        const id = document.getElementById('a-id').value, name = document.getElementById('a-nm').value, ps = document.getElementById('a-ps').value;
        this.db.push({ id, name, ps, att:[], res:[] });
        this.sync(); alert("Student Saved!"); this.refreshAdmin();
    },

    pushNews() {
        const n = document.getElementById('a-news').value;
        localStorage.setItem('rps_pro_news', n); this.news = n; alert("News Updated!");
    },

    saveResult() {
        const id = document.getElementById('a-sel').value, sub = document.getElementById('a-sub').value, t = document.getElementById('a-t').value, o = document.getElementById('a-o').value;
        const idx = this.db.findIndex(x => x.id === id);
        this.db[idx].res.push({ sub, t, o });
        this.sync(); alert("Marks Added!");
    },

    loadUser() {
        document.getElementById('stu-name').innerText = this.user.name;
        document.getElementById('stu-id-tag').innerText = "ID: " + this.user.id;
        document.getElementById('stu-img').src = "https://ui-avatars.com/api/?name=" + this.user.name + "&background=random";
        document.getElementById('news-box').innerText = this.news;
    },

    view(type) {
        this.showPage('pg-viewer');
        const box = document.getElementById('view-content');
        if(type === 'att') {
            document.getElementById('view-title').innerText = "Attendance Log";
            box.innerHTML = `<table><tr><th>Date</th><th>Status</th></tr><tr><td>Today</td><td>Present</td></tr></table>`;
        } else if(type === 'res') {
            document.getElementById('view-title').innerText = "Results";
            let h = `<table><tr><th>Subject</th><th>Marks</th><th>%</th></tr>`;
            this.user.res.forEach(r => h += `<tr><td>${r.sub}</td><td>${r.o}/${r.t}</td><td>${(r.o/r.t*100).toFixed(1)}%</td></tr>`);
            box.innerHTML = h + `</table>`;
        } else if(type === 'prof') {
            document.getElementById('view-title').innerText = "My Profile";
            box.innerHTML = `<div class="card"><b>Name:</b> ${this.user.name}<br><b>ID:</b> ${this.user.id}<br><b>School:</b> RPS Jajod</div>`;
        }
    },

    showPage(id, isAdmin = false) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('nav-bar').classList.toggle('hidden', id === 'pg-login' || isAdmin);
    },

    refreshAdmin() { document.getElementById('a-sel').innerHTML = this.db.map(s => `<option value="${s.id}">${s.name}</option>`).join(''); },
    sync() { localStorage.setItem('rps_pro_db', JSON.stringify(this.db)); }
};

setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
