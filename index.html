<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Jajod - Official Portal</title>
    <style>
        :root { --blue: #007BFF; --dark: #0d1b3e; --light: #f8f9fa; }
        body { font-family: sans-serif; margin: 0; background: #eef2f7; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 450px; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.2); position: relative; padding-bottom: 60px; }
        .hidden { display: none !important; }
        .header { background: var(--dark); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: white; margin: 12px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid #eee; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { background: var(--blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Grid Menu */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .item { background: white; padding: 15px 5px; border-radius: 10px; text-align: center; border: 1px solid #eee; cursor: pointer; font-size: 12px; }
        .icon { font-size: 24px; display: block; margin-bottom: 5px; }

        /* Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-btn { text-align: center; color: #888; font-size: 11px; cursor: pointer; flex: 1; }
        .active { color: var(--blue); font-weight: bold; }
        
        .avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #eee; }
    </style>
</head>
<body>

<div class="app">

    <div id="sc-login" style="padding: 60px 25px; text-align: center;">
        <h1 style="color: var(--dark);">RPS Jajod</h1>
        <p id="login-msg">Enter Mobile Number to login</p>
        <input type="text" id="login-val" placeholder="Mobile Number...">
        <button class="btn" onclick="core.doLogin()">Continue →</button>
        <p style="color: var(--blue); cursor: pointer;" onclick="core.toggleLogin()">or Login with username</p>
    </div>

    <div id="sc-teacher" class="hidden">
        <div class="header"><span>Teacher Master Control</span><button onclick="location.reload()">Logout</button></div>
        
        <div class="card">
            <h3>Update / Add Student</h3>
            <input type="text" id="t-mobile" placeholder="Mobile Number (Login ID) *">
            <input type="text" id="t-name" placeholder="Full Name">
            <input type="text" id="t-class" placeholder="Class">
            <input type="number" id="t-fees" placeholder="Fees (₹)">
            <input type="number" id="t-att" placeholder="Attendance %">
            <label>Student Photo:</label>
            <input type="file" id="t-photo" accept="image/*">
            <button class="btn" onclick="core.saveStudent()">Save Student</button>
        </div>

        <div class="card" style="background: #e3f2fd;">
            <h3>Bulk Homework (To All)</h3>
            <textarea id="t-bulk-hw" placeholder="Write homework for all students..."></textarea>
            <button class="btn" style="background: #1976D2;" onclick="core.sendBulk()">Send to All Students</button>
        </div>
    </div>

    <div id="sc-student" class="hidden">
        <div class="header"><span id="top-title">RPS Home</span><span onclick="location.reload()">Logout</span></div>

        <div id="v-home">
            <div class="card" style="display:flex; align-items:center; gap:15px;">
                <img id="s-img" class="avatar" src="">
                <div><h3 id="s-name" style="margin:0;">Name</h3><span id="s-class">Class</span></div>
            </div>
            <div class="card" style="display:flex; justify-content:space-between; text-align:center;">
                <div><small>Attendance</small><br><strong id="s-att" style="color:green">0%</strong></div>
                <div><small>Pending Fees</small><br><strong id="s-fees" style="color:red">₹0</strong></div>
            </div>
            <div class="grid">
                <div class="item" onclick="core.openFeat('Homework')"><span class="icon">📚</span>Homework</div>
                <div class="item" onclick="core.openFeat('Exam')"><span class="icon">📝</span>Exam</div>
                <div class="item" onclick="core.openFeat('Timetable')"><span class="icon">📅</span>Timetable</div>
                <div class="item" onclick="core.openFeat('Syllabus')"><span class="icon">📋</span>Syllabus</div>
                <div class="item" onclick="core.openFeat('Transport')"><span class="icon">🚌</span>Transport</div>
                <div class="item" onclick="core.openFeat('Notice')"><span class="icon">🔔</span>Notice</div>
            </div>
        </div>

        <div id="v-detail" class="hidden">
            <div class="card">
                <h2 id="det-title" style="color:var(--blue)">Section</h2>
                <div id="det-body" style="white-space: pre-wrap; padding: 10px 0;"></div>
                <button class="btn" onclick="core.switchView('home')">Back</button>
            </div>
        </div>

        <div class="nav">
            <div class="nav-btn active" id="n-home" onclick="core.switchView('home')">🏠<br>Home</div>
            <div class="nav-btn" onclick="alert('Profile view active')">👤<br>Profile</div>
        </div>
    </div>

</div>

<script>
    const core = {
        db: JSON.parse(localStorage.getItem('rps_v3')) || [],
        bulkHW: localStorage.getItem('rps_bulk') || "No homework assigned.",
        mode: 'mob',
        curr: null,

        toggleLogin: function() {
            this.mode = (this.mode === 'mob') ? 'user' : 'mob';
            document.getElementById('login-val').placeholder = (this.mode === 'mob') ? "Mobile Number..." : "Username...";
            document.getElementById('login-msg').innerText = "Login using " + this.mode;
        },

        doLogin: function() {
            const val = document.getElementById('login-val').value.trim();
            if (val === "9999") { this.show('sc-teacher'); return; }
            
            const s = this.db.find(x => this.mode === 'mob' ? x.mobile === val : x.name.toLowerCase() === val.toLowerCase());
            if (s) { this.curr = s; this.loadStu(); } else { alert("Account not found!"); }
        },

        saveStudent: function() {
            const mob = document.getElementById('t-mobile').value;
            if(!mob) return alert("Mobile ID Required!");

            const photoInput = document.getElementById('t-photo');
            const reader = new FileReader();
            
            const proceedSave = (imgData) => {
                const data = {
                    mobile: mob,
                    name: document.getElementById('t-name').value,
                    class: document.getElementById('t-class').value,
                    fees: document.getElementById('t-fees').value,
                    att: document.getElementById('t-att').value,
                    img: imgData || "https://cdn-icons-png.flaticon.com/512/149/149071.png"
                };
                const idx = this.db.findIndex(x => x.mobile === mob);
                if(idx > -1) this.db[idx] = data; else this.db.push(data);
                localStorage.setItem('rps_v3', JSON.stringify(this.db));
                alert("Student Saved/Updated!");
            };

            if(photoInput.files[0]) {
                reader.readAsDataURL(photoInput.files[0]);
                reader.onload = () => proceedSave(reader.result);
            } else { proceedSave(); }
        },

        sendBulk: function() {
            const hw = document.getElementById('t-bulk-hw').value;
            localStorage.setItem('rps_bulk', hw);
            alert("Homework sent to all students!");
        },

        loadStu: function() {
            this.show('sc-student');
            this.switchView('home');
            document.getElementById('s-name').innerText = this.curr.name;
            document.getElementById('s-class').innerText = "Class: " + this.curr.class;
            document.getElementById('s-att').innerText = this.curr.att + "%";
            document.getElementById('s-fees').innerText = "₹" + this.curr.fees;
            document.getElementById('s-img').src = this.curr.img;
        },

        openFeat: function(type) {
            this.switchView('detail');
            document.getElementById('det-title').innerText = type;
            document.getElementById('det-body').innerText = (type === 'Homework') ? localStorage.getItem('rps_bulk') : "Official " + type + " data will appear here.";
        },

        show: function(id) {
            document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        },

        switchView: function(v) {
            document.getElementById('v-home').classList.add('hidden');
            document.getElementById('v-detail').classList.add('hidden');
            document.getElementById('v-' + v).classList.remove('hidden');
        }
    };
</script>
</body>
</html>
