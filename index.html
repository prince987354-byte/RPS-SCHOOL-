<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Portal - Fully Working</title>
    <style>
        :root { --primary: #4361ee; --dark: #0f172a; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--dark); }
        .app { width: 100%; max-width: 450px; min-height: 100vh; background: #fff; margin: 0 auto; position: relative; padding-bottom: 80px; box-shadow: 0 0 40px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }

        /* Headers */
        .header { background: var(--dark); color: white; padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 25px 25px; }
        .p-strip { display: flex; align-items: center; gap: 15px; padding: 15px; background: white; margin: -25px 15px 15px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .p-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        /* Form Elements */
        .card { background: white; margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-family: inherit; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        /* Grid & Badges */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .item { background: #f8fafc; padding: 15px 5px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #eee; }
        .item i { font-size: 24px; display: block; margin-bottom: 5px; }
        .item span { font-size: 11px; font-weight: 700; color: #64748b; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; color: white; }

        /* Nav Bar */
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; display: flex; height: 75px; border-top: 1px solid #eee; align-items: center; z-index: 1000; }
        .nav-link { flex: 1; text-align: center; color: #94a3b8; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-link.active { color: var(--primary); }
        .center-btn { background: var(--primary); color: white !important; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: translateY(-20px); font-size: 22px; box-shadow: 0 5px 15px rgba(67,97,238,0.3); }

        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; text-align: left; font-size: 13px; }
    </style>
</head>
<body>

<div class="app">
    <div id="scr-login" style="padding: 100px 30px; text-align: center;">
        <h1 style="color: var(--primary); font-size: 30px;">RPS PORTAL</h1>
        <input type="text" id="l-id" placeholder="Mobile / User ID">
        <input type="password" id="l-pass" placeholder="Password">
        <button class="btn" style="margin-top:15px;" onclick="sys.login()">Login Now</button>
    </div>

    <div id="scr-admin" class="hidden">
        <div class="header"><b>ADMIN CONSOLE</b> <button onclick="location.reload()" style="color:white; background:none; border:none;">Logout</button></div>
        <div class="card">
            <h4>Update News/Alerts</h4>
            <textarea id="adm-news" placeholder="Write new school alerts here..."></textarea>
            <button class="btn" onclick="sys.updateNews()">Push News Update</button>
        </div>
        <div class="card" style="background:#f0f9ff;">
            <h4>Manage Students</h4>
            <input type="text" id="a-id" placeholder="Mobile ID">
            <input type="text" id="a-name" placeholder="Full Name">
            <input type="password" id="a-pass" placeholder="Set Password">
            <input type="file" id="a-pic" accept="image/*">
            <button class="btn" onclick="sys.reg()">Register Student</button>
        </div>
        <div class="card">
            <h4>Attendance & Marks</h4>
            <select id="a-sel"></select>
            <input type="text" id="a-sub" placeholder="Subject Name">
            <div style="display:flex; gap:10px;"><input type="number" id="a-tot" placeholder="Total"><input type="number" id="a-obt" placeholder="Obt"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button class="btn" style="background:#10b981" onclick="sys.mark('Present')">Present</button>
                <button class="btn" style="background:#ef4444" onclick="sys.mark('Absent')">Absent</button>
                <button class="btn" style="background:var(--dark)" onclick="sys.addRes()">Save Mark</button>
            </div>
        </div>
    </div>

    <div id="scr-student" class="hidden">
        <div class="header"><span>RPS STUDENT</span></div>
        <div id="v-home">
            <div class="p-strip">
                <img id="s-img" src="" class="p-img">
                <div><h3 id="s-name" style="margin:0;">Name</h3><span id="s-id-txt" style="color:var(--primary); font-size:11px;">ID: 000</span></div>
            </div>
            <div class="grid">
                <div class="item" onclick="sys.nav('att')"><i>📅</i><span>Attendance</span></div>
                <div class="item" onclick="sys.nav('res')"><i>🏆</i><span>Results</span></div>
                <div class="item" onclick="sys.nav('hw')"><i>📚</i><span>Homework</span></div>
            </div>
            <div class="card" style="background:var(--primary); color:white;">
                <h4 style="margin:0;">📢 News & Alerts</h4>
                <p id="st-news-txt" style="font-size:12px; margin-top:10px;">No new alerts.</p>
            </div>
        </div>

        <div id="v-profile" class="hidden" style="padding:20px; text-align:center;">
            <img id="sp-img" src="" style="width:120px; height:120px; border-radius:50%; border:5px solid var(--primary);">
            <h2 id="sp-name">Name</h2>
            <p id="sp-id">ID: 000</p>
            <div class="card" style="text-align:left;">
                <p><b>School:</b> RPS Jajod</p>
                <p><b>Status:</b> Active Student</p>
                <p><b>Session:</b> 2026-27</p>
            </div>
            <button class="btn" onclick="sys.nav('home')">Back</button>
        </div>

        <div id="v-data" class="hidden" style="padding:20px;">
            <h2 id="d-title">Title</h2>
            <div id="d-body"></div>
            <button class="btn" style="background:var(--dark); margin-top:20px;" onclick="sys.nav('home')">Back</button>
        </div>

        <div class="nav">
            <div class="nav-link" id="n-home" onclick="sys.nav('home')">🏠<br>Home</div>
            <div class="nav-link" id="n-prof" onclick="sys.nav('profile')">👤<br>Profile</div>
            <div class="nav-link center-btn" onclick="sys.nav('home')">🔳</div>
            <div class="nav-link" onclick="sys.nav('home')">🔔<br>Updates</div>
            <div class="nav-link" onclick="alert('RPS News Feed is active!')">🏢<br>News</div>
        </div>
    </div>
</div>

<script>
const sys = {
    db: JSON.parse(localStorage.getItem('rps_v11_db')) || [],
    news: localStorage.getItem('rps_news') || "Welcome to the new portal!",
    u: null,

    login: function() {
        const id = document.getElementById('l-id').value, ps = document.getElementById('l-pass').value;
        if(id === "9999" && ps === "RPS@123") { this.show('scr-admin'); this.refresh(); return; }
        const user = this.db.find(x => x.id === id && x.ps === ps);
        if(user) { this.u = user; this.show('scr-student'); this.load(); } else alert("Wrong ID/Pass");
    },

    updateNews: function() {
        const txt = document.getElementById('adm-news').value;
        localStorage.setItem('rps_news', txt);
        this.news = txt;
        alert("News updated for all students!");
    },

    reg: function() {
        const id = document.getElementById('a-id').value, name = document.getElementById('a-name').value, ps = document.getElementById('a-pass').value, f = document.getElementById('a-pic').files[0];
        const save = (img) => {
            const data = { id, name, ps, img:img||'', att:[], res:[] };
            this.db.push(data); this.sync(); alert("Registered!"); this.refresh();
        };
        if(f) { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => save(r.result); } else save();
    },

    mark: function(st) {
        const id = document.getElementById('a-sel').value, idx = this.db.findIndex(x => x.id === id);
        this.db[idx].att.unshift({ d: new Date().toLocaleDateString(), st });
        this.sync(); alert("Attendance Logged!");
    },

    addRes: function() {
        const id = document.getElementById('a-sel').value, sub = document.getElementById('a-sub').value, t = document.getElementById('a-tot').value, o = document.getElementById('a-obt').value;
        const idx = this.db.findIndex(x => x.id === id);
        this.db[idx].res.push({ sub, t, o });
        this.sync(); alert("Result Added!");
    },

    load: function() {
        document.getElementById('s-name').innerText = this.u.name;
        document.getElementById('s-id-txt').innerText = "ID: " + this.u.id;
        document.getElementById('s-img').src = this.u.img || "https://via.placeholder.com/55";
        document.getElementById('sp-name').innerText = this.u.name;
        document.getElementById('sp-id').innerText = "Student ID: " + this.u.id;
        document.getElementById('sp-img').src = this.u.img || "https://via.placeholder.com/120";
        document.getElementById('st-news-txt').innerText = this.news;
    },

    nav: function(v) {
        document.getElementById('v-home').classList.add('hidden');
        document.getElementById('v-data').classList.add('hidden');
        document.getElementById('v-profile').classList.add('hidden');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

        if(v === 'home') { document.getElementById('v-home').classList.remove('hidden'); document.getElementById('n-home').classList.add('active'); }
        else if(v === 'profile') { document.getElementById('v-profile').classList.remove('hidden'); document.getElementById('n-prof').classList.add('active'); }
        else {
            document.getElementById('v-data').classList.remove('hidden');
            let b = document.getElementById('d-body');
            if(v === 'att') {
                document.getElementById('d-title').innerText = "Attendance History";
                b.innerHTML = `<table><tr><th>Date</th><th>Status</th></tr>` + this.u.att.map(a => `<tr><td>${a.d}</td><td><span class="badge" style="background:${a.st=='Present'?'#10b981':'#ef4444'}">${a.st}</span></td></tr>`).join('') + `</table>`;
            }
            if(v === 'res') {
                document.getElementById('d-title').innerText = "Academic Result";
                b.innerHTML = `<table><tr><th>Subject</th><th>Marks</th><th>%</th></tr>` + this.u.res.map(r => `<tr><td>${r.sub}</td><td>${r.o}/${r.t}</td><td>${(r.o/r.t*100).toFixed(1)}%</td></tr>`).join('') + `</table>`;
            }
        }
    },

    refresh: function() { document.getElementById('a-sel').innerHTML = this.db.map(s => `<option value="${s.id}">${s.name}</option>`).join(''); },
    sync: function() { localStorage.setItem('rps_v11_db', JSON.stringify(this.db)); },
    show: function(id) { document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
};
</script>
</body>
</html>
